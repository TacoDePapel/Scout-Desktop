<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src https://*.supabase.co wss://*.supabase.co;" />
  <title>Scout</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div id="app">
    <!-- Static fallback so the window is never pitch black, even if
         renderer.js fails to parse or the CDN scripts time out. -->
    <div id="boot-fallback" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,'Segoe UI',sans-serif;color:#E4AF7A;text-align:center;padding:24px;">
      <div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:52px;letter-spacing:0.05em;line-height:1;">SCOUT</div>
      <div style="font-size:10px;letter-spacing:0.30em;color:rgba(182,128,57,0.55);text-transform:uppercase;margin-top:10px;">By Orage AI</div>
      <div style="margin-top:28px;width:36px;height:2px;background:linear-gradient(90deg,transparent,#B68039,transparent);"></div>
      <div id="boot-fallback-msg" style="margin-top:32px;font-size:11px;opacity:0.4;max-width:320px;line-height:1.6;">Loading…</div>
    </div>
  </div>
  <script>
    // If the renderer hasn't replaced #app within 8s, surface a hint.
    setTimeout(function () {
      var el = document.getElementById('boot-fallback-msg')
      if (el) el.textContent = "Still loading. If this persists, check your internet connection — Scout fetches its UI runtime from a CDN on first launch."
    }, 8000)
  </script>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- fflate — fast zip for "Export all skills" -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8/umd/index.js"></script>
  <!-- marked.js — markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>

  <script src="./renderer.js"></script>
</body>
</html>
