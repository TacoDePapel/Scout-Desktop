name: Release

# Triggered by pushing a version tag (e.g. v2.2.0) or manually from the
# Actions tab. Builds Scout on Windows, macOS, and Linux runners in parallel,
# then publishes a single GitHub Release with all the artifacts attached.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate icon
        run: npm run gen-icon

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      # Signs + notarizes when the Apple secrets are configured on the repo
      # (MAC_CERT_P12_BASE64, MAC_CERT_PASSWORD, APPLE_ID,
      # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID — see PUBLISHING-MAC.md).
      # Without them it falls back to the unsigned build, where users need the
      # "Open me first.command" Gatekeeper unblock.
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ] && [ -n "$APPLE_ID" ]; then
            echo "Apple secrets found — building signed + notarized"
            npx electron-builder --mac --publish never --config.mac.notarize=true
          else
            echo "No Apple signing secrets — building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --publish never
          fi

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scout-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
